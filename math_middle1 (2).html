<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>중1 수학 AI 문제 생성기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222636;
    --border: #2e3347;
    --accent: #4f8ef7;
    --accent2: #f7c948;
    --green: #3ecf8e;
    --red: #f76f6f;
    --text: #e8eaf0;
    --text2: #8b90a8;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* 헤더 */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 14px;
    color: white;
  }

  .logo-text {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text2);
    margin-top: 1px;
  }

  .header-badge {
    background: var(--accent);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
  }

  /* 메인 레이아웃 */
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* 단원 선택 */
  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .unit-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
  }

  .unit-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 12px;
    cursor: pointer;
    transition: all 0.18s;
    text-align: left;
  }

  .unit-btn:hover {
    border-color: var(--accent);
    background: var(--surface2);
    transform: translateY(-2px);
  }

  .unit-btn.active {
    border-color: var(--accent);
    background: rgba(79,142,247,0.12);
  }

  .unit-num {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 6px;
  }

  .unit-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
  }

  /* 난이도 & 문항수 */
  .controls-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .control-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    flex: 1;
    min-width: 200px;
  }

  .control-label {
    font-size: 12px;
    color: var(--text2);
    font-weight: 600;
    margin-bottom: 12px;
  }

  .pill-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .pill {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    background: transparent;
    color: var(--text2);
  }

  .pill:hover { border-color: var(--accent); color: var(--accent); }

  .pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .pill.active.easy { background: var(--green); border-color: var(--green); }
  .pill.active.medium { background: var(--accent2); border-color: var(--accent2); color: #333; }
  .pill.active.hard { background: var(--red); border-color: var(--red); }
  .pill.special { color: #a855f7; border-color: #a855f7; }
  .pill.active.special { background: linear-gradient(135deg, #a855f7, #ec4899); border-color: #a855f7; color: white; }
  .tag-special { background: rgba(168,85,247,0.15); color: #a855f7; }

  /* 생성 버튼 */
  .generate-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    padding: 16px 32px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
  }

  .generate-btn:hover { background: #3a7be8; transform: translateY(-1px); }
  .generate-btn:active { transform: translateY(0); }
  .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* 문제 영역 */
  .problems-area {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .problem-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .problem-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .problem-num {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
  }

  .difficulty-tag {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 10px;
  }

  .tag-easy { background: rgba(62,207,142,0.15); color: var(--green); }
  .tag-medium { background: rgba(247,201,72,0.15); color: var(--accent2); }
  .tag-hard { background: rgba(247,111,111,0.15); color: var(--red); }

  .problem-body {
    padding: 18px;
  }

  .problem-text {
    font-size: 15px;
    line-height: 1.8;
    color: var(--text);
    margin-bottom: 16px;
  }

  .answer-input {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 15px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    width: 200px;
    transition: border-color 0.15s;
  }

  .answer-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .answer-input.correct { border-color: var(--green); background: rgba(62,207,142,0.08); }
  .answer-input.wrong { border-color: var(--red); background: rgba(247,111,111,0.08); }

  .check-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    margin-left: 8px;
    transition: all 0.15s;
  }

  .check-btn:hover { border-color: var(--accent); color: var(--accent); }

  .solution-area {
    margin-top: 14px;
    background: var(--bg);
    border-radius: 8px;
    padding: 14px;
    border-left: 3px solid var(--accent);
    display: none;
  }

  .solution-area.show { display: block; }

  .solution-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }

  .solution-text {
    font-size: 14px;
    line-height: 1.9;
    color: var(--text2);
    white-space: pre-line;
  }

  .solution-answer {
    font-size: 15px;
    font-weight: 700;
    color: var(--green);
    margin-top: 8px;
  }

  /* 로딩 */
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text2);
    font-size: 14px;
  }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* API KEY 입력 */
  .api-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
  }

  .api-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .api-input {
    flex: 1;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
  }

  .api-input:focus { outline: none; border-color: var(--accent); }

  .api-save-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    white-space: nowrap;
  }

  .api-status {
    font-size: 12px;
    margin-top: 8px;
  }

  .api-status.ok { color: var(--green); }
  .api-status.no { color: var(--text2); }

  /* 결과 요약 */
  .result-summary {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: none;
    gap: 24px;
    align-items: center;
  }

  .result-summary.show {
    display: flex;
  }

  .result-item {
    text-align: center;
  }

  .result-num {
    font-family: 'Space Mono', monospace;
    font-size: 24px;
    font-weight: 700;
  }

  .result-label {
    font-size: 11px;
    color: var(--text2);
    margin-top: 2px;
  }

  .result-num.score { color: var(--accent2); }
  .result-num.correct-c { color: var(--green); }
  .result-num.wrong-c { color: var(--red); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">수학</div>
    <div>
      <div class="logo-text">변형문제연구소</div>
      <div class="logo-sub">중1 수학 AI 문제 생성기</div>
    </div>
  </div>
  <div class="header-badge">Beta</div>
</header>

<div class="container">

  <!-- API KEY -->
  <div class="api-box">
    <div class="section-title">🔑 API 설정</div>
    <div class="api-row">
      <input class="api-input" type="password" id="apiKeyInput" placeholder="sk-ant-... Anthropic API Key 입력">
      <button class="api-save-btn" onclick="saveApiKey()">저장</button>
    </div>
    <div class="api-status no" id="apiStatus">API Key를 입력해주세요.</div>
  </div>

  <!-- 단원 선택 -->
  <div>
    <div class="section-title">📚 단원 선택</div>
    <div class="unit-grid" id="unitGrid">
      <div class="unit-btn active" data-unit="정수와 유리수" onclick="selectUnit(this)">
        <div class="unit-num">1단원</div>
        <div class="unit-name">정수와 유리수</div>
      </div>
      <div class="unit-btn" data-unit="문자와 식" onclick="selectUnit(this)">
        <div class="unit-num">2단원</div>
        <div class="unit-name">문자와 식</div>
      </div>
      <div class="unit-btn" data-unit="일차방정식" onclick="selectUnit(this)">
        <div class="unit-num">3단원</div>
        <div class="unit-name">일차방정식</div>
      </div>
      <div class="unit-btn" data-unit="좌표평면과 그래프" onclick="selectUnit(this)">
        <div class="unit-num">4단원</div>
        <div class="unit-name">좌표평면과 그래프</div>
      </div>
      <div class="unit-btn" data-unit="기본 도형" onclick="selectUnit(this)">
        <div class="unit-num">5단원</div>
        <div class="unit-name">기본 도형</div>
      </div>
      <div class="unit-btn" data-unit="작도와 합동" onclick="selectUnit(this)">
        <div class="unit-num">6단원</div>
        <div class="unit-name">작도와 합동</div>
      </div>
      <div class="unit-btn" data-unit="평면도형" onclick="selectUnit(this)">
        <div class="unit-num">7단원</div>
        <div class="unit-name">평면도형</div>
      </div>
      <div class="unit-btn" data-unit="입체도형" onclick="selectUnit(this)">
        <div class="unit-num">8단원</div>
        <div class="unit-name">입체도형</div>
      </div>
      <div class="unit-btn" data-unit="통계" onclick="selectUnit(this)">
        <div class="unit-num">9단원</div>
        <div class="unit-name">통계</div>
      </div>
    </div>
  </div>

  <!-- 난이도 & 문항수 -->
  <div class="controls-row">
    <div class="control-box">
      <div class="control-label">난이도</div>
      <div class="pill-group">
        <button class="pill easy active" onclick="selectDifficulty(this, 'easy')">기초</button>
        <button class="pill medium" onclick="selectDifficulty(this, 'medium')">표준</button>
        <button class="pill hard" onclick="selectDifficulty(this, 'hard')">심화</button>
        <button class="pill special" onclick="selectDifficulty(this, 'special')">⭐ Special</button>
      </div>
    </div>
    <div class="control-box">
      <div class="control-label">문항 수</div>
      <div class="pill-group">
        <button class="pill" onclick="selectCount(this, 3)">3문제</button>
        <button class="pill active" onclick="selectCount(this, 5)">5문제</button>
        <button class="pill" onclick="selectCount(this, 10)">10문제</button>
      </div>
    </div>
  </div>

  <!-- 생성 버튼 -->
  <button class="generate-btn" id="generateBtn" onclick="generateProblems()">
    <span>✨</span>
    <span>문제 생성하기</span>
  </button>

  <!-- 결과 요약 -->
  <div class="result-summary" id="resultSummary">
    <div class="result-item">
      <div class="result-num score" id="scoreNum">-</div>
      <div class="result-label">점수</div>
    </div>
    <div class="result-item">
      <div class="result-num correct-c" id="correctNum">-</div>
      <div class="result-label">정답</div>
    </div>
    <div class="result-item">
      <div class="result-num wrong-c" id="wrongNum">-</div>
      <div class="result-label">오답</div>
    </div>
  </div>

  <!-- 문제 영역 -->
  <div class="problems-area" id="problemsArea"></div>

</div>

<script>
  let apiKey = localStorage.getItem('mathAppApiKey') || '';
  let selectedUnit = '정수와 유리수';
  let selectedDifficulty = 'easy';
  let selectedCount = 5;
  let problems = [];

  // API Key
  window.onload = () => {
    if (apiKey) {
      document.getElementById('apiKeyInput').value = apiKey;
      document.getElementById('apiStatus').textContent = '✅ API Key가 저장되어 있습니다.';
      document.getElementById('apiStatus').className = 'api-status ok';
    }
  };

  function saveApiKey() {
    const val = document.getElementById('apiKeyInput').value.trim();
    if (!val) return;
    apiKey = val;
    localStorage.setItem('mathAppApiKey', val);
    document.getElementById('apiStatus').textContent = '✅ 저장되었습니다.';
    document.getElementById('apiStatus').className = 'api-status ok';
  }

  function selectUnit(el) {
    document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    selectedUnit = el.dataset.unit;
  }

  function selectDifficulty(el, val) {
    document.querySelectorAll('.pill.easy, .pill.medium, .pill.hard, .pill.special').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    selectedDifficulty = val;
  }

  function selectCount(el, val) {
    document.querySelectorAll('.control-box:last-child .pill').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    selectedCount = val;
  }

  const difficultyLabel = { easy: '기초', medium: '표준', hard: '심화', special: '⭐ Special' };
  const difficultyTagClass = { easy: 'tag-easy', medium: 'tag-medium', hard: 'tag-hard', special: 'tag-special' };

  async function generateProblems() {
    if (!apiKey) {
      alert('API Key를 먼저 입력해주세요.');
      return;
    }

    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner" style="width:20px;height:20px;margin:0;border-width:2px"></div><span>생성 중...</span>';

    const area = document.getElementById('problemsArea');
    area.innerHTML = '<div class="loading"><div class="spinner"></div>AI가 문제를 만들고 있습니다...</div>';
    document.getElementById('resultSummary').classList.remove('show');

    const difficultyDesc = {
      easy: '기초 난이도 (개념 확인 수준)',
      medium: '표준 난이도 (교과서 수준)',
      hard: '심화 난이도 (응용 수준)',
      special: '최고 난이도 Special 문제 (경시대회 수준, 다단계 풀이 필요, 창의적 사고 요구, 여러 단원 개념 융합, 서술형)'
    };

    const prompt = `중학교 1학년 수학 "${selectedUnit}" 단원의 ${difficultyDesc[selectedDifficulty]} 문제 ${selectedCount}개를 만들어주세요.

반드시 아래 JSON 형식으로만 응답하세요. 다른 텍스트는 절대 포함하지 마세요.

{
  "problems": [
    {
      "question": "문제 내용 (수식은 일반 텍스트로)",
      "answer": "정답 (숫자나 간단한 식)",
      "solution": "풀이 과정 (단계별로 설명, 줄바꿈 포함)"
    }
  ]
}`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 2000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const data = await response.json();
      const text = data.content[0].text.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(text);
      problems = parsed.problems;
      renderProblems(problems);

    } catch (e) {
      area.innerHTML = '<div class="loading" style="color:#f76f6f">⚠️ 문제 생성에 실패했습니다. API Key를 확인해주세요.</div>';
    }

    btn.disabled = false;
    btn.innerHTML = '<span>✨</span><span>문제 생성하기</span>';
  }

  function renderProblems(probs) {
    const area = document.getElementById('problemsArea');
    area.innerHTML = '';

    probs.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'problem-card';
      card.innerHTML = `
        <div class="problem-header">
          <span class="problem-num">문제 ${i + 1}</span>
          <span class="difficulty-tag ${difficultyTagClass[selectedDifficulty]}">${difficultyLabel[selectedDifficulty]}</span>
        </div>
        <div class="problem-body">
          <div class="problem-text">${p.question}</div>
          <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
            <input class="answer-input" type="text" placeholder="답 입력" id="ans_${i}">
            <button class="check-btn" onclick="checkAnswer(${i}, '${p.answer.replace(/'/g, "\\'")}')">채점</button>
            <button class="check-btn" onclick="toggleSolution(${i})" style="margin-left:0">풀이 보기</button>
          </div>
          <div class="solution-area" id="sol_${i}">
            <div class="solution-label">📝 풀이 과정</div>
            <div class="solution-text">${p.solution}</div>
            <div class="solution-answer">정답: ${p.answer}</div>
          </div>
        </div>
      `;
      area.appendChild(card);
    });
  }

  function checkAnswer(idx, correct) {
    const input = document.getElementById(`ans_${idx}`);
    const userAns = input.value.trim().replace(/\s/g, '');
    const correctAns = correct.trim().replace(/\s/g, '');

    if (userAns === correctAns) {
      input.className = 'answer-input correct';
    } else {
      input.className = 'answer-input wrong';
    }
    updateScore();
  }

  function toggleSolution(idx) {
    const sol = document.getElementById(`sol_${idx}`);
    sol.classList.toggle('show');
  }

  function updateScore() {
    const inputs = document.querySelectorAll('.answer-input');
    let correct = 0, wrong = 0;
    inputs.forEach(inp => {
      if (inp.classList.contains('correct')) correct++;
      if (inp.classList.contains('wrong')) wrong++;
    });

    if (correct + wrong > 0) {
      document.getElementById('resultSummary').classList.add('show');
      document.getElementById('correctNum').textContent = correct;
      document.getElementById('wrongNum').textContent = wrong;
      const score = Math.round((correct / problems.length) * 100);
      document.getElementById('scoreNum').textContent = score + '점';
    }
  }
</script>
</body>
</html>
